name: Deploy production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: portfolio-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    steps:
      - name: Configure SSH
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/portfolio_deploy
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/portfolio_deploy ~/.ssh/known_hosts

      - name: Deploy pushed revision
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DEPLOY_SHA: ${{ github.sha }}
        run: |
          ssh \
            -i ~/.ssh/portfolio_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "deploy $DEPLOY_SHA"

      - name: Deploy knowledge base
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_USER: ${{ secrets.VPS_USER }}
          KB_FAISS_TGZ_B64_1: ${{ secrets.KB_FAISS_TGZ_B64_1 }}
          KB_FAISS_TGZ_B64_2: ${{ secrets.KB_FAISS_TGZ_B64_2 }}
          KB_FAISS_TGZ_B64_3: ${{ secrets.KB_FAISS_TGZ_B64_3 }}
        run: |
          if [ -z "${KB_FAISS_TGZ_B64_1}${KB_FAISS_TGZ_B64_2}${KB_FAISS_TGZ_B64_3}" ]; then
            echo "No knowledge base archive configured."
            exit 0
          fi

          {
            printf '%s' "$KB_FAISS_TGZ_B64_1"
            printf '%s' "$KB_FAISS_TGZ_B64_2"
            printf '%s' "$KB_FAISS_TGZ_B64_3"
          } | ssh \
            -i ~/.ssh/portfolio_deploy \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -p "$VPS_PORT" \
            "$VPS_USER@$VPS_HOST" \
            "deploy-kb"
