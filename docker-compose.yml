services:
  backend:
    build:
      context: ./backend
    ports:
      - "8001:8001"
    environment:
      GROQ_API_KEY: ${GROQ_API_KEY}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.1-8b-instant}
      GROQ_TEMPERATURE: ${GROQ_TEMPERATURE:-0.1}
      GROQ_TIMEOUT_SECONDS: ${GROQ_TIMEOUT_SECONDS:-25}
      CHAT_STRUCTURED_OUTPUT: ${CHAT_STRUCTURED_OUTPUT:-true}
      CHAT_DEBUG_LOG: ${CHAT_DEBUG_LOG:-false}
      KB_DIR: /app/kb
      KB_TOP_K: ${KB_TOP_K:-5}
      KB_MIN_SCORE: ${KB_MIN_SCORE:-0.15}
    volumes:
      - ./kb:/app/kb:ro

  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_BACKEND_PROXY_URL: http://backend:8001
      VITE_STRAPI_PROXY_URL: http://strapi:1337
      CHOKIDAR_USEPOLLING: "true"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    depends_on:
      - backend
      - strapi

  frontend-prod:
    profiles: ["prod"]
    build:
      context: ./frontend
      target: prod
    ports:
      - "8080:80"
    depends_on:
      - backend
      - strapi

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${STRAPI_DATABASE_NAME:-strapi}
      POSTGRES_USER: ${STRAPI_DATABASE_USERNAME:-strapi}
      POSTGRES_PASSWORD: ${STRAPI_DATABASE_PASSWORD:-strapi}
    volumes:
      - strapi_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  strapi:
    build:
      context: ./cms/strapi
    ports:
      - "${STRAPI_PORT:-1337}:1337"
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 1337
      CHOKIDAR_USEPOLLING: "true"
      APP_KEYS: ${STRAPI_APP_KEYS}
      API_TOKEN_SALT: ${STRAPI_API_TOKEN_SALT}
      ADMIN_JWT_SECRET: ${STRAPI_ADMIN_JWT_SECRET}
      TRANSFER_TOKEN_SALT: ${STRAPI_TRANSFER_TOKEN_SALT}
      JWT_SECRET: ${STRAPI_JWT_SECRET}
      ENCRYPTION_KEY: ${STRAPI_ENCRYPTION_KEY}
      DATABASE_CLIENT: postgres
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${STRAPI_DATABASE_NAME:-strapi}
      DATABASE_USERNAME: ${STRAPI_DATABASE_USERNAME:-strapi}
      DATABASE_PASSWORD: ${STRAPI_DATABASE_PASSWORD:-strapi}
      DATABASE_SSL: ${STRAPI_DATABASE_SSL:-false}
    volumes:
      - ./cms/strapi:/opt/app
      - strapi_node_modules:/opt/app/node_modules
      - strapi_uploads:/opt/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  strapi_postgres_data:
  strapi_node_modules:
  strapi_uploads:
